# Configures Flutter's gen-l10n. ARB files live in lib/l10n; the generated
# AppLocalizations is emitted alongside them (lib/l10n/app_localizations.dart)
# and imported via package:kidverse/l10n/app_localizations.dart.
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
