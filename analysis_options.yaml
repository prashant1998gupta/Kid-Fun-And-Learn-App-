include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
  errors:
    invalid_annotation_target: ignore

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_final_locals
    - sort_child_properties_last
    - use_key_in_widget_constructors
    - unnecessary_late
    # NOTE: require_trailing_commas intentionally omitted — the Dart 3.7+
    # formatter owns comma placement and keeps short collections on one line,
    # so enabling this lint fights `dart format`.
