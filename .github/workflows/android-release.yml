name: Android release artifact

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  appbundle:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true
      - name: Restore Android signing and Firebase configuration
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$KEYSTORE_B64" && test -n "$GOOGLE_SERVICES_B64"
          test -n "$STORE_PASSWORD" && test -n "$KEY_PASSWORD" && test -n "$KEY_ALIAS"
          echo "$KEYSTORE_B64" | base64 --decode > android/app/upload-keystore.jks
          echo "$GOOGLE_SERVICES_B64" | base64 --decode > android/app/google-services.json
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
      - run: flutter pub get --enforce-lockfile
      - run: flutter analyze --fatal-infos
      - run: flutter test
      - name: Build signed, obfuscated app bundle
        run: >-
          flutter build appbundle --release
          --obfuscate
          --split-debug-info=build/symbols/android
          --dart-define=APP_ENV=production
          --dart-define=REQUIRE_FIREBASE=true
      - uses: actions/upload-artifact@v4
        with:
          name: kidverse-android-release
          if-no-files-found: error
          retention-days: 30
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/symbols/android/**
